<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>订单Excel批量处理工具</title>
  <style>
    * {box-sizing: border-box; margin: 0; padding: 0;font-family: system-ui, -apple-system, sans-serif}
    body {padding:30px;max-width: 1100px;margin: 0 auto;background:#f7f8fa}
    .card {background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:20px}
    h2 {margin-bottom:16px;color:#222;font-size:20px}
    .row{margin:14px 0}
    label{display:block;margin-bottom:6px;font-weight:500}
    input[type="file"],input[type="text"]{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:15px}
    button{padding:12px 24px;background:#1677ff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:15px;margin-right:12px}
    button:disabled{background:#94bfff;cursor:not-allowed}
    #log{margin-top:16px;padding:12px;background:#f5f7fa;border-radius:6px;white-space:pre-wrap;max-height:220px;overflow:auto;font-size:13px}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
</head>
<body>
  <div class="card">
    <h2>Excel订单批量处理工具（修复行丢失）</h2>
    <div class="row">
      <label>【A固定模板文件】上传</label>
      <input type="file" id="fileA" accept=".xlsx"/>
    </div>
    <div class="row">
      <label>【B业务源文件】上传</label>
      <input type="file" id="fileB" accept=".xlsx"/>
    </div>
    <div class="row">
      <label>【C计算公式文件】上传</label>
      <input type="file" id="fileC" accept=".xlsx"/>
    </div>
    <div class="row">
      <label>店铺URL（备用，如需启用填充H列可放开代码注释）</label>
      <input type="text" id="shopUrl" placeholder="店铺网址"/>
    </div>
    <div class="row">
      <button id="runBtn">一键执行全部处理</button>
      <button id="resetBtn">重置所有文件</button>
    </div>
    <div id="log"></div>
  </div>

<script>
const CONFIG = {
  delStr: "BRL",
  oldChar: ",",
  newChar: ".",
  subStatusKeep: "已送达",
  fixedCurrency: "BRL",
  platformText: "TK",
  dateOutFormat: "YYYY/MM/DD",
  lockAFirstRows: 2,

  BCol: {
    orderID: "A",
    substatus: "D",
    productName: "I",
    createdTimeC: "C",
    createdTimeAC: "AC",
    orderAmount: "X",
    quantity: "L",
    trackingID: "AK",
    shippingProvider: "AD"
  },

  ACol: {
    orderID: "A",
    orderDate: "B",
    currency: "C",
    amount: "D",
    productName: "E",
    quantity: "F",
    unitPrice: "G",
    shopUrl: "H",
    tracking: "I",
    logistics: "J",
    platform: "K"
  }
};

let bufA, bufB, bufC;
let workbookA, workbookB, workbookC;
let sheetA, sheetB, sheetC;
let calcFormula = "";
const logDom = document.getElementById("log");

function printLog(text) {
  logDom.innerHTML += `${new Date().toLocaleTimeString()} ${text}\n`;
  logDom.scrollTop = logDom.scrollHeight;
}

document.getElementById("resetBtn").onclick = ()=> location.reload();

document.getElementById("fileA").addEventListener("change", async e=>{
  const f = e.target.files[0];
  if(!f) return;
  bufA = await f.arrayBuffer();
  workbookA = XLSX.read(new Uint8Array(bufA), {type:"array"});
  sheetA = workbookA.Sheets[workbookA.SheetNames[0]];
  printLog("✅ A模板读取成功");
});

document.getElementById("fileB").addEventListener("change", async e=>{
  const f = e.target.files[0];
  if(!f) return;
  bufB = await f.arrayBuffer();
  workbookB = XLSX.read(new Uint8Array(bufB), {type:"array"});
  sheetB = workbookB.Sheets[workbookB.SheetNames[0]];
  printLog("✅ B源文件读取成功");
});

document.getElementById("fileC").addEventListener("change", async e=>{
  const f = e.target.files[0];
  if(!f) return;
  bufC = await f.arrayBuffer();
  workbookC = XLSX.read(new Uint8Array(bufC), {type:"array"});
  sheetC = workbookC.Sheets[workbookC.SheetNames[0]];
  const range = XLSX.utils.decode_range(sheetC["!ref"]||"A1:A1");
  const cell = sheetC[XLSX.utils.encode_cell({r:0,c:0})];
  calcFormula = cell?.f || cell?.v || "";
  printLog(`✅ C公式读取完成：${calcFormula}`);
});

function formatDateToYMD(inputDateStr){
  try{
    const dt = new Date(inputDateStr);
    const y = dt.getFullYear();
    const m = String(dt.getMonth()+1).padStart(2,"0");
    const d = String(dt.getDate()).padStart(2,"0");
    return `${y}/${m}/${d}`;
  }catch(e){
    return "";
  }
}

function colLetterToNum(letter){ return XLSX.utils.decode_col(letter); }
function numToColLetter(num){ return XLSX.utils.encode_col(num); }

function writeA(rowIndex, colLetter, value){
  if(rowIndex < CONFIG.lockAFirstRows) return;
  const c = colLetterToNum(colLetter);
  const key = XLSX.utils.encode_cell({r:rowIndex, c});
  if(!sheetA[key]) sheetA[key] = {};
  sheetA[key].v = value;
  sheetA[key].t = typeof value === "number" ? "n" : "s";
}

document.getElementById("runBtn").onclick = async ()=>{
  const btn = document.getElementById("runBtn");
  btn.disabled = true;
  logDom.innerHTML = "";
  const shopUrl = document.getElementById("shopUrl").value.trim();

  if(!bufA || !bufB || !bufC) return printLog("❌ 请上传A、B、C三个Excel文件"), btn.disabled=false;
  if(!calcFormula) return printLog("❌ C文件未读取到计算公式"), btn.disabled=false;

  try{
    // 步骤1：B全局字符替换
    printLog("1/11 执行B文件字符全局替换");
    const allCellsB = Object.keys(sheetB);
    allCellsB.forEach(key=>{
      if(key.startsWith("!")) return;
      const cell = sheetB[key];
      if(typeof cell.v === "string"){
        cell.v = cell.v.replaceAll(CONFIG.delStr, "").replaceAll(CONFIG.oldChar, CONFIG.newChar);
      }
    });

    // ==========【核心修复重写】步骤2 过滤逻辑，彻底解决行丢失 ==========
    printLog("2/11 B文件筛选清洗，删除原始第二行");
    const jsonAll = XLSX.utils.sheet_to_json(sheetB, {header:1});
    const colD = colLetterToNum(CONFIG.BCol.substatus);
    const colX = colLetterToNum(CONFIG.BCol.orderAmount);
    const validList = [];
    // 循环所有原始行
    for (let r = 0; r < jsonAll.length; r++) {
      // 直接跳过原始第2行（数组下标1）
      if (r === 1) continue;
      const rowArr = jsonAll[r];
      const status = rowArr[colD] ?? "";
      const amount = Number(rowArr[colX] ?? 0);
      // 满足条件才保留
      if (status === CONFIG.subStatusKeep && amount !== 0) {
        validList.push(rowArr);
      }
    }
    // 用合法行重建sheet
    sheetB = XLSX.utils.aoa_to_sheet(validList);
    printLog(`✅ 筛选完成，剩余有效行数：${validList.length}`);

    // 步骤3：AC列日期格式化
    printLog("3/11 B文件AC列日期格式化");
    const rangeB = XLSX.utils.decode_range(sheetB["!ref"]);
    const colAC = colLetterToNum(CONFIG.BCol.createdTimeAC);
    for(let r=0;r<=rangeB.e.r;r++){
      const cellKey = XLSX.utils.encode_cell({r,c:colAC});
      const cell = sheetB[cellKey];
      if(cell?.v){
        cell.v = formatDateToYMD(cell.v);
        cell.t = "s";
      }
    }

    // 步骤4：A解除保护
    printLog("4/11 A文件移除工作表保护");
    delete sheetA["!protect"];
    const bRange = XLSX.utils.decode_range(sheetB["!ref"]);
    const totalDataRows = bRange.e.r + 1;
    printLog(`B文件最终有效数据行数：${totalDataRows}`);

    // 步骤5：公式计算订单号
    printLog("5/11 计算公式生成订单编号回填A文件");
    const colB_A = colLetterToNum(CONFIG.BCol.orderID);
    for(let r=0;r<totalDataRows;r++){
      const cellKey = XLSX.utils.encode_cell({r,c:colB_A});
      const rawVal = sheetB[cellKey]?.v ?? "";
      let res;
      try{
        const expr = calcFormula.replaceAll("{{val}}", rawVal);
        res = eval(expr);
      }catch(e){ res = rawVal; }
      writeA(r + CONFIG.lockAFirstRows, CONFIG.ACol.orderID, res);
    }

    // 步骤6：订单日期
    printLog("6/11 回填订单日期");
    const colB_Created = colLetterToNum(CONFIG.BCol.createdTimeAC);
    for(let r=0;r<totalDataRows;r++){
      const cell = sheetB[XLSX.utils.encode_cell({r,c:colB_Created})];
      writeA(r + CONFIG.lockAFirstRows, CONFIG.ACol.orderDate, cell?.v ?? "");
    }

    // 步骤7：金额、币种、数量
    printLog("7/11 回填订单金额、币种、商品数量");
    const colB_X = colLetterToNum(CONFIG.BCol.orderAmount);
    const colB_L = colLetterToNum(CONFIG.BCol.quantity);
    for(let r=0;r<totalDataRows;r++){
      const amt = sheetB[XLSX.utils.encode_cell({r,c:colB_X})]?.v ?? "";
      const qty = sheetB[XLSX.utils.encode_cell({r,c:colB_L})]?.v ?? "";
      writeA(r + CONFIG.lockAFirstRows, CONFIG.ACol.amount, amt);
      writeA(r + CONFIG.lockAFirstRows, CONFIG.ACol.currency, CONFIG.fixedCurrency);
      writeA(r + CONFIG.lockAFirstRows, CONFIG.ACol.quantity, qty);
    }

    // 步骤8：单价计算
    printLog("8/11 自动计算商品单价");
    const colA_D = colLetterToNum(CONFIG.ACol.amount);
    const colA_F = colLetterToNum(CONFIG.ACol.quantity);
    for(let r=0;r<totalDataRows;r++){
      const rowWrite = r + CONFIG.lockAFirstRows;
      const amt = Number(sheetA[XLSX.utils.encode_cell({r:rowWrite,c:colA_D})]?.v || 0);
      const qty = Number(sheetA[XLSX.utils.encode_cell({r:rowWrite,c:colA_F})]?.v || 0);
      let price = "-";
      if(qty !== 0) price = (amt / qty).toFixed(2);
      writeA(rowWrite, CONFIG.ACol.unitPrice, price);
    }

    // 步骤9：物流快递
    printLog("9/11 回填快递单号与物流企业名称");
    const colB_AK = colLetterToNum(CONFIG.BCol.trackingID);
    const colB_AD = colLetterToNum(CONFIG.BCol.shippingProvider);
    for(let r=0;r<totalDataRows;r++){
      const track = sheetB[XLSX.utils.encode_cell({r,c:colB_AK})]?.v ?? "";
      const logis = sheetB[XLSX.utils.encode_cell({r,c:colB_AD})]?.v ?? "";
      writeA(r + CONFIG.lockAFirstRows, CONFIG.ACol.tracking, track);
      writeA(r + CONFIG.lockAFirstRows, CONFIG.ACol.logistics, logis);
    }

    // 步骤10：填充TK
    printLog("10/11 填充电商平台名称TK");
    for(let r=0;r<totalDataRows;r++){
      writeA(r + CONFIG.lockAFirstRows, CONFIG.ACol.platform, CONFIG.platformText);
    }

    // 步骤11：商品名 B-I → A-E
    printLog("11/11 回填商品名称（B-I → A-E）");
    const colB_I = colLetterToNum(CONFIG.BCol.productName);
    for(let r=0;r<totalDataRows;r++){
      const pName = sheetB[XLSX.utils.encode_cell({r,c:colB_I})]?.v ?? "";
      writeA(r + CONFIG.lockAFirstRows, CONFIG.ACol.productName, pName);
    }

    /* 开启店铺URL填充H列取消注释
    printLog("补充：填充店铺URL至H列");
    for(let r=0;r<totalDataRows;r++){
      writeA(r + CONFIG.lockAFirstRows, CONFIG.ACol.shopUrl, shopUrl);
    }
    */

    workbookA.Sheets[workbookA.SheetNames[0]] = sheetA;
    const outBuffer = XLSX.write(workbookA, {type:"array", bookType:"xlsx"});
    saveAs(new Blob([outBuffer], {type:"application/octet-stream"}), "订单处理完成_A模板.xlsx");
    printLog("🎉 全部11步执行完毕，文件自动下载！");

  }catch(err){
    printLog(`❌ 程序报错：${err.message}`);
    console.error(err);
  }finally{
    btn.disabled = false;
  }
};
</script>
</body>
</html>
