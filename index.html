<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动化订单数据处理工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        .loader { border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-2xl">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">📊 自动化订单数据处理工具</h1>
        <p class="text-gray-500 mb-6 text-sm">系统已内置 A 文件。您只需上传 B 文件，即可一键完成 11 步数据处理。</p>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">上传 B 文件 (数据源)</label>
                <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer border rounded-lg p-2">
            </div>
            <button onclick="processData()" id="processBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200">🚀 开始处理</button>
        </div>

        <div id="statusArea" class="mt-6 hidden">
            <div class="flex items-center gap-2 text-blue-600 mb-2">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-6 w-6"></div>
                <span id="statusText">正在读取文件...</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5"><div id="progressBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div></div>
        </div>

        <div id="resultArea" class="mt-6 hidden p-4 bg-green-50 border border-green-200 rounded-lg text-center">
            <p class="text-green-800 font-medium mb-3">🎉 处理完成！所有 11 个步骤已成功执行。</p>
            <button onclick="downloadFile()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-medium shadow-sm">📥 下载处理后的 A 文件</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
