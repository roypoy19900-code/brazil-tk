<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brazil TK 订单处理工具</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .version-tag {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 20px;
            display: block;
        }
        .upload-area {
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            padding: 40px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: #3498db;
            background: #ecf0f1;
        }
        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #2980b9;
        }
        .btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            color: #27ae60;
            font-weight: bold;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Brazil TK 订单处理工具</h1>
        <span id="version-display" class="version-tag">加载中...</span>
        
        <div class="upload-area" id="drop-zone">
            <p>📂 拖拽 B 文件 (OrderSKUList.xlsx) 到此处</p>
            <p>或点击选择文件</p>
            <input type="file" id="file-input" accept=".xlsx, .xls" class="hidden">
        </div>

        <button id="process-btn" class="btn" disabled>开始处理</button>
        <div id="status"></div>
    </div>

    <!-- 引入 SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
